<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmácia da Liga | GreenFlow PIM</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1b5e20" />
  <style>
    :root{--bg:#f3fbf4;--card:#ffffff;--text:#14311b;--muted:#5f7765;--line:#d7ead9;--p:#1b5e20;--p2:#2e7d32;--a:#66bb6a;--ok:#388e3c;--warn:#f9a825;--danger:#c62828;--shadow:0 12px 30px rgba(16,56,24,.10)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,system-ui,sans-serif;background:radial-gradient(circle at top,#effaf1 0,#f6fff7 35%,#eef7ef 100%);color:var(--text)}
    header{padding:28px 20px;background:linear-gradient(135deg,#0f3d18,#1b5e20 45%,#2e7d32);color:#fff;position:sticky;top:0;z-index:5;box-shadow:var(--shadow)}
    .wrap{max-width:1200px;margin:0 auto} .hero{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
    .brand h1{margin:0;font-size:1.6rem}.brand p{margin:6px 0 0;opacity:.9}.pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:10px 14px;border-radius:999px}
    main{max-width:1200px;margin:0 auto;padding:20px} .grid{display:grid;grid-template-columns:320px 1fr;gap:18px}@media (max-width:980px){.grid{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden} .card h2{margin:0 0 14px;font-size:1.05rem;padding:0 18px}
    .side{padding:18px} .nav{display:grid;gap:10px}.nav button{border:0;border-radius:14px;padding:12px 14px;font-weight:700;cursor:pointer;transition:.2s;background:#edf7ef;color:var(--p);text-align:left}
    .nav button.active{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}.btn{border:0;border-radius:14px;padding:12px 18px;font-weight:700;cursor:pointer;transition:.2s}.btn.primary{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}.btn.secondary{background:#e7f4ea;color:var(--p)}
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:0 18px 18px}@media (max-width:720px){.metrics{grid-template-columns:repeat(2,1fr)}}
    .m{padding:16px;border-radius:18px;background:linear-gradient(180deg,#fff,#f7fdf8);border:1px solid var(--line);text-align:center} .m strong{font-size:1.55rem;display:block}.m span{color:var(--muted);font-size:.9rem}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0;padding:0 18px} input,select,textarea{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #cfe3d2;background:#fbfefb;color:var(--text);outline:none;font-size:1rem}
    input:focus,select:focus,textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(27,94,32,.1)} textarea{min-height:110px;resize:vertical} .row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}@media(max-width:720px){.row{grid-template-columns:1fr}}
    .list{display:grid;gap:12px;padding:0 18px}.item{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fff;transition:.2s}.item:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
    .top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start}.tag{padding:6px 10px;border-radius:999px;font-size:.8rem;font-weight:800}.green{background:#e8f5e9;color:#1b5e20}.yellow{background:#fff8e1;color:#8a6d00}.blue{background:#e3f2fd;color:#0d47a1}.red{background:#ffebee;color:#b71c1c}
    .hide{display:none!important} .footer{padding:18px 20px;color:var(--muted);text-align:center} .toast{position:fixed;right:18px;bottom:18px;background:var(--p);color:#fff;padding:14px 16px;border-radius:14px;box-shadow:var(--shadow);display:none;max-width:320px;z-index:99}
    .login{padding:40px 18px;text-align:center;max-width:380px;margin:40px auto}.login input{margin-bottom:14px}.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
    .modal-box{background:var(--card);border-radius:20px;padding:28px;max-width:520px;width:92%;max-height:90vh;overflow:auto}.close{position:absolute;top:14px;right:18px;background:none;border:0;font-size:1.6rem;cursor:pointer;color:var(--muted)}
    .fb{padding:12px;border-radius:12px;margin-top:12px;display:none}.fb.vis{display:block}.fb-ok{background:#e8f5e9;color:#1b5e20}.fb-err{background:#ffebee;color:#b71c1c}.badge{position:absolute;top:14px;right:18px;background:var(--a);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}
  </style>
</head>
<body>
  <header><div class="wrap hero"><div class="brand"><h1>GreenFlow PIM</h1><p>Preparação Individualizada da Medicação • Farmácia da Liga</p></div><div class="pill" id="badgeAvisos" style="display:none">0</div></div></header>
  <main id="main">
    <div class="login hide" id="login">
      <h2>Entrar</h2>
      <input type="text" id="loginCodigo" placeholder="Código ex: 001">
      <input type="password" id="loginPass" placeholder="Password">
      <button class="btn primary btn-block" onclick="entrar()">Entrar</button>
      <div class="fb" id="fbLogin"></div>
    </div>
    <div id="app" class="hide">
      <div class="grid">
        <aside class="card side">
          <h2>Bem-vindo, <strong id="nomeUser"></strong></h2>
          <small id="role"></small>
          <div class="nav" id="nav"></div>
          <div class="card" id="miniStats"></div>
        </aside>
        <section id="view"></section>
      </div>
    </div>
  </main>
  <footer>© 2026 Farmácia da Liga • GreenFlow PIM</footer>
  <div class="toast" id="toast"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, setDoc, addDoc, getDocs, query, where, orderBy, updateDoc, limit, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

const config = {
  apiKey: "AIzaSyBa6pjv7czSYaQ2ecShefFeLXAsxsd4Dnc",
  authDomain: "pims-84362.firebaseapp.com",
  projectId: "pims-84362",
  storageBucket: "pims-84362.firebasestorage.app",
  messagingSenderId: "21232070010",
  appId: "1:21232070010:web:330d2f68be460632753ac3"
};
const app = initializeApp(config);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null, userData = null, userMap = {}, allUsers = [], currentView = 'dashboard';

const states = ['Registada', 'Aguarda preparação', 'Em preparação', 'Preparada', 'Pronta para levantamento', 'Dispensada', 'Anulada'];
const stateColors = { 'Registada': 'blue', 'Aguarda preparação': 'yellow', 'Em preparação': 'yellow', 'Preparada': 'green', 'Pronta para levantamento': 'green', 'Dispensada': 'grey', 'Anulada': 'red' };

const navItems = [
  { id: 'dashboard', label: 'Dashboard', icon: '📊' },
  { id: 'patients', label: 'Utentes', icon: '👥' },
  { id: 'newPim', label: 'Nova PIM', icon: '➕' },
  { id: 'pims', label: 'PIMs', icon: '📋' },
  { id: 'myPims', label: 'Minhas', icon: '⭐' },
  { id: 'team', label: 'Equipa', icon: '👨‍⚕️' }
];

function formatDate(iso) {
  if (!iso) return '---';
  try { return new Date(iso).toLocaleDateString('pt-PT'); } catch { return iso; }
}

function msg(id, text, ok = true) {
  const el = document.getElementById(id);
  if (el) {
    el.className = 'fb vis ' + (ok ? 'fb-ok' : 'fb-err');
    el.textContent = text;
  }
}

function show(el) { el.classList.remove('hide'); }
function hide(el) { el.classList.add('hide'); }
function toast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function go(view) {
  currentView = view;
  renderNav();
  renderView();
}

function renderNav() {
  document.getElementById('nav').innerHTML = navItems.map(item => 
    `<button class="${item.id === currentView ? 'active' : ''}" onclick="go('${item.id}')">${item.icon} ${item.label}</button>`
  ).join('');
}

async function loadUserMap() {
  const snap = await getDocs(collection(db, 'utilizadores'));
  userMap = {}; allUsers = [];
  snap.forEach(d => {
    const data = d.data();
    if (data.codigo) userMap[data.codigo.trim()] = data.email;
    allUsers.push({ id: d.id, ...data });
  });
  console.log('Mapa utilizadores:', Object.keys(userMap).length);
}

function renderView() {
  const view = document.getElementById('view');
  if (currentView === 'dashboard') {
    view.innerHTML = `<h2>Dashboard</h2><div class="metrics" id="stats"></div><div class="toolbar"><button class="btn primary" onclick="go('newPim')">➕ Nova PIM</button></div>`;
    loadStats();
  } else if (currentView === 'login') {
    show(document.getElementById('login'));
    hide(document.getElementById('app'));
  } else {
    hide(document.getElementById('login'));
    show(document.getElementById('app'));
    // Implement other views similarly
    view.innerHTML = `<h2>${navItems.find(i => i.id === currentView)?.label || 'Carregando...'}</h2><p>Funcionalidade ${currentView} em produção. Dados reais via Firebase.</p>`;
  }
}

async function loadStats() {
  const statsDiv = document.getElementById('stats');
  statsDiv.innerHTML = '<div class="m"><strong>A carregar...</strong></div>';
  try {
    const q = query(collection(db, 'pims'), limit(100));
    const snap = await getDocs(q);
    const counts = { total: 0, prepared: 0, dispensed: 0 };
    snap.forEach(() => counts.total++);
    statsDiv.innerHTML = `
      <div class="m"><strong>${counts.total}</strong><span>Total PIMs</span></div>
      <div class="m"><strong>${counts.prepared}</strong><span>Preparadas</span></div>
      <div class="m"><strong>${counts.dispensed}</strong><span>Dispensadas</span></div>
      <div class="m"><strong>0</strong><span>Avisos</span></div>
    `;
  } catch (e) {
    statsDiv.innerHTML = '<div class="m"><strong>Erro</strong><span>Ver console</span></div>';
  }
}

async function entrar() {
  const cod = document.getElementById('loginCodigo').value.trim();
  const pass = document.getElementById('loginPass').value;
  msg('fbLogin', 'A entrar...', true);
  const email = userMap[cod];
  if (!email) return msg('fbLogin', 'Código inválido.', false);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    msg('fbLogin');
  } catch (e) {
    msg('fbLogin', e.code === 'auth/wrong-password' ? 'Password errada.' : 'Erro ao entrar.', false);
  }
}

async function fazerLogout() {
  await signOut(auth);
}

onAuthStateChanged(auth, async (u) => {
  user = u;
  if (u) {
    const udoc = await getDoc(doc(db, 'utilizadores', u.uid));
    userData = udoc.exists() ? udoc.data() : { nome: u.email, funcao: 'operador', codigo: '000' };
    document.getElementById('nomeUser').textContent = userData.nome;
    document.getElementById('role').textContent = `• ${userData.funcao}`;
    await loadUserMap();
    go('dashboard');
  } else {
    go('login');
  }
});

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
</script>
</body>
</html>
